# Gitleaks configuration for browser-experiments
title = "browser-experiments"

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey)[\s]*[=:][\s]*["']?([a-z0-9_\-]{10,64})["']?'''
tags = ["key", "api"]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)(?:secret|password|token)[\s]*[=:][\s]*["']?([a-z0-9_\-]{10,64})["']?'''
tags = ["secret", "key"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36}'''
tags = ["key", "github"]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''github_pat_[A-Za-z0-9_]{22}_[A-Za-z0-9_]{59}'''
tags = ["key", "github"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["key", "aws"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN[ A-Z0-9_-]{0,100}PRIVATE KEY-----'''
tags = ["key", "crypto"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*'''
tags = ["token", "jwt"]

# Allow list - files to ignore
[allowlist]
paths = [
  "package.json",
  "pnpm-lock.yaml",
  "*.test.*",
  "*.spec.*",
  "*.min.js",
  "*.map",
  "dist/**",
  "node_modules/**",
  ".git/**"
]

[allowlist.regexes]
description = "Allow test/example patterns"
regexes = [
  '''example.*key''',
  '''test.*secret''',
  '''demo.*token''',
  '''placeholder.*password'''
]