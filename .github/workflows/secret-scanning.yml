name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Scan for secrets
        run: |
          echo "=== Scanning for secrets ==="
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --json
        continue-on-error: true
      
      - name: Basic grep scan
        run: |
          echo "=== Basic secret pattern scan ==="
          echo "Checking for common secret patterns..."
          
          # Check for hardcoded secrets
          PATTERNS=(
            "password\s*=\s*['\"].*['\"]"
            "secret\s*=\s*['\"].*['\"]"
            "key\s*=\s*['\"].*['\"]"
            "token\s*=\s*['\"].*['\"]"
            "api_key\s*=\s*['\"].*['\"]"
            "api_secret\s*=\s*['\"].*['\"]"
            "private_key\s*=\s*['\"].*['\"]"
            "access_token\s*=\s*['\"].*['\"]"
            "auth_token\s*=\s*['\"].*['\"]"
            "bearer\s*['\"].*['\"]"
            "ghp_"
            "gho_"
            "ghu_"
            "ghs_"
            "ghr_"
            "github_pat_"
            "AKIA[0-9A-Z]{16}"
            "sk_live_[0-9a-zA-Z]{24}"
            "rk_live_[0-9a-zA-Z]{24}"
            "sq0atp-"
            "sq0csp-"
            "eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*"
          )
          
          for pattern in "${PATTERNS[@]}"; do
            echo "Checking pattern: $pattern"
            grep -r -I -n -E "$pattern" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude="*.lock" \
              --exclude="*.map" \
              --exclude="*.min.js" || true
          done
          
          echo "=== Checking for .env files ==="
          find . -name "*.env*" -o -name ".env" 2>/dev/null | grep -v node_modules | grep -v .git || echo "No .env files found"
          
          echo "=== Checking for credential files ==="
          find . -name "*credential*" -o -name "*password*" -o -name "*secret*" 2>/dev/null | grep -v node_modules | grep -v .git || echo "No credential files found"
        continue-on-error: true
      
      - name: Check file permissions
        run: |
          echo "=== Checking file permissions ==="
          find . -type f -name "*.pem" -o -name "*.key" -o -name "*.crt" -o -name "*.cer" 2>/dev/null | grep -v node_modules | grep -v .git || echo "No certificate/key files found"