name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual triggering

jobs:
  scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run basic secret scan
        run: |
          echo "🔍 Running secret scan..."
          echo ""
          
          # Colors for output
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m' # No Color
          
          FOUND_ISSUES=0
          
          # Function to check pattern
          check_pattern() {
            local pattern_name="$1"
            local pattern="$2"
            
            echo -n "Checking for ${pattern_name}... "
            
            # Search in all files except exclusions
            MATCHES=$(grep -r -I -n -E "$pattern" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude="*.lock" \
              --exclude="*.map" \
              --exclude="*.min.js" \
              --exclude="*.test.*" \
              --exclude="*.spec.*" \
              --exclude="package.json" \
              --exclude="pnpm-lock.yaml" \
              --exclude=".github/workflows/secret-scanning.yml" 2>/dev/null | wc -l)
            
            if [ "$MATCHES" -gt 0 ]; then
              echo -e "${RED}❌ Found $MATCHES matches${NC}"
              grep -r -I -n -E "$pattern" . \
                --exclude-dir=.git \
                --exclude-dir=node_modules \
                --exclude-dir=dist \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                --exclude="*.test.*" \
                --exclude="*.spec.*" \
                --exclude="package.json" \
                --exclude="pnpm-lock.yaml" \
                --exclude=".github/workflows/secret-scanning.yml" 2>/dev/null | head -3
              return 1
            else
              echo -e "${GREEN}✅ OK${NC}"
              return 0
            fi
          }
          
          echo "=== Checking for secret patterns ==="
          echo ""
          
          # Check for common secret patterns
          check_pattern "GitHub tokens" "gh[pousr]_[A-Za-z0-9_]{36}" || FOUND_ISSUES=1
          check_pattern "GitHub PAT" "github_pat_[A-Za-z0-9_]{22}_[A-Za-z0-9_]{59}" || FOUND_ISSUES=1
          check_pattern "AWS keys" "AKIA[0-9A-Z]{16}" || FOUND_ISSUES=1
          check_pattern "Private key markers" "-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY" || FOUND_ISSUES=1
          check_pattern "JWT tokens" "eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*" || FOUND_ISSUES=1
          
          # Check for generic secret patterns
          check_pattern "password assignments" "(?i)(password|passwd|pwd)\s*[=:]\s*['\"][^'\"]{4,}['\"]" || FOUND_ISSUES=1
          check_pattern "secret assignments" "(?i)(secret|token|key)\s*[=:]\s*['\"][^'\"]{4,}['\"]" || FOUND_ISSUES=1
          check_pattern "API key assignments" "(?i)(api[_-]?key|apikey)\s*[=:]\s*['\"][^'\"]{4,}['\"]" || FOUND_ISSUES=1
          
          echo ""
          echo "=== Checking for sensitive files ==="
          echo ""
          
          # Check for sensitive file types (excluding our scanning scripts)
          echo -n "Looking for sensitive files... "
          SENSITIVE_FILES=$(find . -type f \( \
            -name "*.env" \
            -o -name ".env.*" \
            -o -name "*secret*" \
            -o -name "*credential*" \
            -o -name "*password*" \
            -o -name "*.key" \
            -o -name "*.pem" \
            -o -name "*.crt" \
            -o -name "*.cer" \
          \) 2>/dev/null | \
          grep -v node_modules | \
          grep -v .git | \
          grep -v dist | \
          grep -v ".github/workflows/secret-scanning.yml" | \
          grep -v "scripts/.*secret" | \
          grep -v "scripts/check-secrets" | \
          wc -l)
          
          if [ "$SENSITIVE_FILES" -gt 0 ]; then
            echo -e "${YELLOW}⚠️  Found $SENSITIVE_FILES potentially sensitive files${NC}"
            find . -type f \( \
              -name "*.env" \
              -o -name ".env.*" \
              -o -name "*secret*" \
              -o -name "*credential*" \
              -o -name "*password*" \
              -o -name "*.key" \
              -o -name "*.pem" \
              -o -name "*.crt" \
              -o -name "*.cer" \
            \) 2>/dev/null | \
            grep -v node_modules | \
            grep -v .git | \
            grep -v dist | \
            grep -v ".github/workflows/secret-scanning.yml" | \
            grep -v "scripts/.*secret" | \
            grep -v "scripts/check-secrets"
            FOUND_ISSUES=1
          else
            echo -e "${GREEN}✅ OK${NC}"
          fi
          
          # Summary
          echo ""
          echo "=== Summary ==="
          if [ "$FOUND_ISSUES" -eq 0 ]; then
            echo -e "${GREEN}✅ No obvious secrets found${NC}"
            echo ""
            echo "Note: This is a basic check. Always review code manually before pushing to public repositories."
            exit 0
          else
            echo -e "${RED}🚨 Potential secrets found!${NC}"
            echo ""
            echo "Please review the findings above."
            echo ""
            echo "If these are false positives (test data, examples, etc.):"
            echo "1. Make sure they're not real secrets"
            echo "2. Consider adding them to .gitignore if they shouldn't be committed"
            echo ""
            echo "For real secrets:"
            echo "1. Remove them from the code immediately"
            echo "2. Use environment variables or secret management"
            echo "3. Rotate any exposed credentials"
            exit 1
          fi