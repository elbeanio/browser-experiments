name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan on Sunday at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets
      
      - name: Run detect-secrets scan
        run: |
          echo "=== Running detect-secrets scan ==="
          echo ""
          
          # First, create a baseline if it doesn't exist
          if [ ! -f .secrets.baseline ]; then
            echo "Creating initial secrets baseline..."
            detect-secrets scan > .secrets.baseline
          fi
          
          # Scan for new secrets
          echo "Scanning for new secrets..."
          detect-secrets scan --baseline .secrets.baseline
          
          # Check if any new secrets were found
          NEW_SECRETS=$(detect-secrets audit .secrets.baseline --report --only-real | grep -c "True")
          
          if [ "$NEW_SECRETS" -gt 0 ]; then
            echo "❌ Found $NEW_SECRETS new potential secrets!"
            echo ""
            echo "Details:"
            detect-secrets audit .secrets.baseline --report
            echo ""
            echo "Please review and either:"
            echo "1. Remove the secrets from the code"
            echo "2. If they are false positives, add them to the baseline with:"
            echo "   detect-secrets audit .secrets.baseline"
            exit 1
          else
            echo "✅ No new secrets found!"
          fi
      
      - name: Run basic pattern scan
        run: |
          echo ""
          echo "=== Running basic pattern scan ==="
          echo ""
          
          # Define patterns to check (excluding the scanning workflow itself)
          declare -A PATTERNS
          PATTERNS["github-token"]="gh[pousr]_[A-Za-z0-9_]{36}"
          PATTERNS["github-pat"]="github_pat_[A-Za-z0-9_]{22}_[A-Za-z0-9_]{59}"
          PATTERNS["aws-key"]="AKIA[0-9A-Z]{16}"
          PATTERNS["private-key-start"]="-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY"
          PATTERNS["jwt-token"]="eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*"
          
          FOUND_ISSUES=0
          
          for name in "${!PATTERNS[@]}"; do
            pattern="${PATTERNS[$name]}"
            echo "Checking for $name..."
            
            # Use git grep to search only tracked files, excluding certain paths
            MATCHES=$(git grep -n -E "$pattern" -- \
              ":(exclude).github/workflows/secret-scanning.yml" \
              ":(exclude)*.lock" \
              ":(exclude)*.map" \
              ":(exclude)*.min.js" \
              ":(exclude)node_modules/*" \
              ":(exclude)dist/*" 2>/dev/null | wc -l)
            
            if [ "$MATCHES" -gt 0 ]; then
              echo "❌ Found $MATCHES potential $name matches"
              git grep -n -E "$pattern" -- \
                ":(exclude).github/workflows/secret-scanning.yml" \
                ":(exclude)*.lock" \
                ":(exclude)*.map" \
                ":(exclude)*.min.js" \
                ":(exclude)node_modules/*" \
                ":(exclude)dist/*" 2>/dev/null | head -5
              FOUND_ISSUES=1
            fi
          done
          
          echo ""
          echo "=== Checking for sensitive files ==="
          echo ""
          
          # Check for sensitive file types
          SENSITIVE_FILES=$(find . -type f \( \
            -name "*.env" \
            -o -name ".env.*" \
            -o -name "*secret*" \
            -o -name "*credential*" \
            -o -name "*password*" \
            -o -name "*.key" \
            -o -name "*.pem" \
            -o -name "*.crt" \
            -o -name "*.cer" \
          \) 2>/dev/null | \
          grep -v node_modules | \
          grep -v .git | \
          grep -v dist | \
          wc -l)
          
          if [ "$SENSITIVE_FILES" -gt 0 ]; then
            echo "⚠️  Found $SENSITIVE_FILES potentially sensitive files:"
            find . -type f \( \
              -name "*.env" \
              -o -name ".env.*" \
              -o -name "*secret*" \
              -o -name "*credential*" \
              -o -name "*password*" \
              -o -name "*.key" \
              -o -name "*.pem" \
              -o -name "*.crt" \
              -o -name "*.cer" \
            \) 2>/dev/null | \
            grep -v node_modules | \
            grep -v .git | \
            grep -v dist
            FOUND_ISSUES=1
          fi
          
          if [ "$FOUND_ISSUES" -eq 0 ]; then
            echo "✅ Basic pattern scan passed!"
            exit 0
          else
            echo ""
            echo "🚨 Issues found in basic pattern scan!"
            echo "Please review the findings above."
            echo "Note: Some matches may be false positives (test data, examples, etc.)"
            exit 1
          fi
      
      - name: Upload scan results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: |
            .secrets.baseline
          retention-days: 7