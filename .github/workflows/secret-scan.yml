name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan on Sunday at midnight

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: HEAD
          extra_args: --only-verified --fail
      
      - name: Upload results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: trufflehog-results.json
  
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
          redact: true
          exit-code: 1
          verbose: true
  
  basic-scan:
    name: Basic Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run basic secret scan
        run: |
          echo "=== Basic Secret Pattern Scan ==="
          echo ""
          
          # Check for common secret patterns (excluding test/example files)
          echo "1. Checking for hardcoded secrets..."
          PATTERNS=(
            # API keys/tokens
            "['\"]password['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]secret['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]api_key['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]api_secret['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]access_token['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]auth_token['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            "['\"]private_key['\"]\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            
            # GitHub tokens
            "ghp_[0-9a-zA-Z]{36}"
            "gho_[0-9a-zA-Z]{36}"
            "ghu_[0-9a-zA-Z]{36}"
            "ghs_[0-9a-zA-Z]{36}"
            "ghr_[0-9a-zA-Z]{36}"
            "github_pat_[0-9a-zA-Z]{22}_[0-9a-zA-Z]{59}"
            
            # AWS keys
            "AKIA[0-9A-Z]{16}"
            "ASIA[0-9A-Z]{16}"
            
            # Stripe keys
            "sk_live_[0-9a-zA-Z]{24}"
            "rk_live_[0-9a-zA-Z]{24}"
            
            # JWT tokens
            "eyJ[A-Za-z0-9-_=]+\.[A-Za-z0-9-_=]+\.?[A-Za-z0-9-_.+/=]*"
          )
          
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            echo "Checking pattern: ${pattern:0:50}..."
            MATCHES=$(grep -r -I -n -E "$pattern" . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude="*.lock" \
              --exclude="*.map" \
              --exclude="*.min.js" \
              --exclude="*.test.*" \
              --exclude="*.spec.*" \
              --exclude="package.json" \
              --exclude="pnpm-lock.yaml" 2>/dev/null | wc -l)
            
            if [ "$MATCHES" -gt 0 ]; then
              echo "❌ Found $MATCHES potential matches for pattern"
              grep -r -I -n -E "$pattern" . \
                --exclude-dir=.git \
                --exclude-dir=node_modules \
                --exclude-dir=dist \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                --exclude="*.test.*" \
                --exclude="*.spec.*" \
                --exclude="package.json" \
                --exclude="pnpm-lock.yaml" 2>/dev/null | head -3
              FOUND=1
            fi
          done
          
          echo ""
          echo "2. Checking for sensitive files..."
          SENSITIVE_FILES=$(find . -type f \( -name "*.env*" -o -name ".env" -o -name "*secret*" -o -name "*credential*" -o -name "*password*" -o -name "*.key" -o -name "*.pem" -o -name "*.crt" -o -name "*.cer" \) 2>/dev/null | grep -v node_modules | grep -v .git | grep -v dist | wc -l)
          
          if [ "$SENSITIVE_FILES" -gt 0 ]; then
            echo "⚠️  Found $SENSITIVE_FILES potentially sensitive files:"
            find . -type f \( -name "*.env*" -o -name ".env" -o -name "*secret*" -o -name "*credential*" -o -name "*password*" -o -name "*.key" -o -name "*.pem" -o -name "*.crt" -o -name "*.cer" \) 2>/dev/null | grep -v node_modules | grep -v .git | grep -v dist
            FOUND=1
          fi
          
          echo ""
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No obvious secrets found in basic scan"
          else
            echo "🚨 Potential secrets found! Please review."
            echo "Note: Some matches may be false positives (test data, examples, etc.)"
            echo "If these are intentional, add them to .gitignore or exclude patterns."
            exit 1
          fi